<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Articles and projects on technology, learning, and ideas — plus updates on Substack." />
    <meta id="theme-color-meta" name="theme-color" content="#f2f4f8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Source+Sans+3:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <title>Raghav Kalyan | Writing & projects</title>
    <script>
      (function () {
        var dark = false;
        try {
          var t = localStorage.getItem('theme');
          if (t === 'dark') dark = true;
          else if (t === 'light') dark = false;
          else dark = false;
          if (dark) document.documentElement.classList.add('dark');
          else document.documentElement.classList.remove('dark');
        } catch (e) {
          document.documentElement.classList.remove('dark');
        }
        var meta = document.getElementById('theme-color-meta');
        if (meta) meta.setAttribute('content', dark ? '#1a1d24' : '#f2f4f8');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
